[R001]
brief = "place holder diagnostics"
group = "Uncategorized"
    [R001.W]
    explain = "This is placeholder diagnostics. (Warning)"
    [R001.I]
    explain = "This is placeholder diagnostics. (Info)"
    [R001.R]
    explain = "This is placeholder diagnostics. (Remark)"
    [R001.V]
    explain = "This is placeholder diagnostics. (Verbose)"
    [R001.N]
    explain = "This is placeholder diagnostics. (Note)"
    [R001.D]
    explain = "This is placeholder diagnostics. (Debug)"
    [R001.E]
    explain = "This is placeholder diagnostics. (Error)"
    [R001.F]
    explain = "This is placeholder diagnostics. (Fatal)"

[R003]
brief = "undefined macro"
group = "macro"

    [R003.E]
    explain = """
    The macro was invoked but no definition was found in the
    current scope, imported scopes, or global scope.
    """

    [R003.W]
    explain = """
    The macro was invoked but could not be resolved. This may
    indicate a missing import or a typo in the macro name.
    Expansion was skipped.
    """

    [R003.N]
    explain = "Related to an undefined macro reference above."
    