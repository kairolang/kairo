[S019]
brief = "unclosed parenthesis"
group = "syntax"

    [S019.E]
    explain = """
    # unclosed parenthesis error

    this error occurs when the lexer encounters an opening parenthesis that is not properly closed. this can happen if the closing parenthesis is missing or if there is a mismatch in the number of opening and closing parentheses.

    ## example

    - correct usage:
    ```kairo
    fn main() {
        let x = (10 + 20); // this is correct syntax
    }
    ```

    - incorrect usage:
    ```kairo
    fn main() {
        let x = (10 + 20; // this is incorrect syntax, as the opening parenthesis is not properly closed with a closing parenthesis.
    }
    ```

    ## how to fix
    ensure that all opening parentheses are properly closed with matching closing parentheses. check for any missing closing parentheses that may be causing the issue.
    """

